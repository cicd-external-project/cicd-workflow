name: FlowCI Quality
on:
  workflow_run:
    workflows:
      - FlowCI Access Gate
    types:
      - completed
  workflow_dispatch: {}
permissions:
  contents: read
  security-events: write
env:
  CI_VALIDATE_URL: https://flowci-be-test.onrender.com/api/v1/ci/validate
  CI_REPORT_URL: ${{ secrets.CI_REPORT_URL }}
jobs:
  validate-access:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate FlowCI access
        run: |
          RESPONSE=$(curl -sf -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CI_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"${{ github.repository }}\",\"stage\":\"quality\",\"workflowRunId\":\"${{ github.run_id }}\",\"headSha\":\"${{ github.event.workflow_run.head_sha || github.sha }}\"}" \
            "$CI_VALIDATE_URL") || true
          HTTP_CODE=$(printf '%s' "$RESPONSE" | tail -1)
          BODY=$(printf '%s' "$RESPONSE" | head -n -1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::FlowCI authorization failed (HTTP $HTTP_CODE). ${BODY}"
            exit 1
          fi
          echo "FlowCI authorization validated."
  branch-policy:
    needs:
      - validate-access
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.resolve.outputs.branch }}
      coverage-threshold: ${{ steps.resolve.outputs.coverage-threshold }}
      fail-on-warning: ${{ steps.resolve.outputs.fail-on-warning }}
      sonar-enabled: ${{ steps.resolve.outputs.sonar-enabled }}
      sonar-gate-wait: ${{ steps.resolve.outputs.sonar-gate-wait }}
    steps:
      - name: Resolve branch policy
        id: resolve
        env:
          SONAR_CONFIGURED: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_ORGANIZATION != '' && secrets.SONAR_PROJECT_KEY != '' }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          if [ "$BRANCH" = "uat" ] || [ "$BRANCH" = "main" ]; then
            COVERAGE_THRESHOLD=90
            FAIL_ON_WARNING=true
            SONAR_GATE_WAIT=true
          else
            COVERAGE_THRESHOLD=80
            FAIL_ON_WARNING=false
            SONAR_GATE_WAIT=false
          fi
          {
            echo "branch=$BRANCH"
            echo "coverage-threshold=$COVERAGE_THRESHOLD"
            echo "fail-on-warning=$FAIL_ON_WARNING"
            echo "sonar-enabled=$SONAR_CONFIGURED"
            echo "sonar-gate-wait=$SONAR_GATE_WAIT"
          } >> "$GITHUB_OUTPUT"
          echo "Branch policy: branch=$BRANCH coverage>=$COVERAGE_THRESHOLD failOnWarning=$FAIL_ON_WARNING sonar=$SONAR_CONFIGURED gateWait=$SONAR_GATE_WAIT"
  backend-tests:
    needs:
      - branch-policy
    uses: cicd-external-project/cicd-workflow/.github/workflows/backend-tests.yml@v1
    with:
      working-directory: .
      system-name: flowci-demo-backend
      backend-stack: nestjs
      node-version: 22
      coverage-threshold: ${{ fromJson(needs.branch-policy.outputs.coverage-threshold) }}
      enforce-coverage: true
      test-command: npm test -- --coverage --coverageReporters=json-summary --coverageReporters=lcov --json --outputFile=test-results.json
      checkout-ref: ${{ github.event.workflow_run.head_sha || github.sha }}
  lint:
    needs:
      - branch-policy
    uses: cicd-external-project/cicd-workflow/.github/workflows/lint-check.yml@v1
    with:
      working-directory: .
      system-name: flowci-demo-backend
      node-version: 22
      lint-command: npm run lint
      fail-on-warning: ${{ fromJson(needs.branch-policy.outputs.fail-on-warning) }}
      checkout-ref: ${{ github.event.workflow_run.head_sha || github.sha }}
  security:
    needs:
      - validate-access
    uses: cicd-external-project/cicd-workflow/.github/workflows/security-scan.yml@v1
    with:
      working-directory: .
      system-name: flowci-demo-backend
      node-version: 22
      fail-on-high: true
      checkout-ref: ${{ github.event.workflow_run.head_sha || github.sha }}
  sonar:
    needs:
      - branch-policy
      - backend-tests
    if: ${{ needs.branch-policy.outputs.sonar-enabled == 'true' }}
    uses: cicd-external-project/cicd-workflow/.github/workflows/sonarcloud-scan.yml@v1
    with:
      working-directory: .
      system-name: flowci-demo-backend
      sources-path: src
      tests-path: src
      coverage-report-path: coverage/lcov.info
      coverage-artifact-name: flowci-demo-backend-coverage
      quality-gate-wait: ${{ fromJson(needs.branch-policy.outputs.sonar-gate-wait) }}
      checkout-ref: ${{ github.event.workflow_run.head_sha || github.sha }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
  report-results:
    if: ${{ always() }}
    needs:
      - validate-access
      - branch-policy
      - backend-tests
      - lint
      - security
      - sonar
    runs-on: ubuntu-latest
    env:
      CI_TOKEN: ${{ secrets.CI_TOKEN }}
      CI_REPORT_URL: ${{ secrets.CI_REPORT_URL }}
    steps:
      - name: Report stage results to FlowCI
        env:
          CI_TOKEN: ${{ secrets.CI_TOKEN }}
          CI_REPORT_URL: ${{ secrets.CI_REPORT_URL }}
          GH_REPO: ${{ github.repository }}
          GH_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          GH_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          GH_RUN_ID: ${{ github.run_id }}
          STAGE_FAILED: ${{ contains(needs.*.result, 'failure') }}
          STAGE_CANCELLED: ${{ contains(needs.*.result, 'cancelled') }}
          COVERAGE_PCT: ${{ needs.backend-tests.outputs.coverage-percent }}
          COVERAGE_THRESHOLD: ${{ needs.branch-policy.outputs.coverage-threshold }}
        run: |
          # Derive stage conclusion from upstream needs results
          if [ "$STAGE_FAILED" = "true" ]; then
            CONCLUSION="failure"
          elif [ "$STAGE_CANCELLED" = "true" ]; then
            CONCLUSION="cancelled"
          else
            CONCLUSION="success"
          fi

          # Build results sub-object (quality stage only — reads from job outputs)
          RESULTS="{}"

          # Include coverage only when COVERAGE_PCT is a real number
          # (central workflows emit "unknown" when coverage is not available)
          if echo "$COVERAGE_PCT" | grep -qE '^[0-9]+([.][0-9]+)?$'; then
            RESULTS=$(jq -n \
              --argjson pct "$COVERAGE_PCT" \
              --argjson threshold "${COVERAGE_THRESHOLD:-0}" \
              '{"coverage":{"pct":$pct,"threshold":$threshold}}')
          fi

          # Build and POST the payload with jq — no string interpolation of context values
          PAYLOAD=$(jq -n \
            --arg repo     "$GH_REPO" \
            --arg branch   "$GH_BRANCH" \
            --arg sha      "$GH_SHA" \
            --argjson runId "$GH_RUN_ID" \
            --arg stage    "quality" \
            --arg conclusion "$CONCLUSION" \
            --argjson results "$RESULTS" \
            '{repoFullName:$repo,branch:$branch,commitSha:$sha,runId:$runId,stage:$stage,conclusion:$conclusion,results:$results}')
          curl -sf --max-time 5 \
            -X POST "$CI_REPORT_URL" \
            -H "Authorization: Bearer $CI_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            || echo "::warning::Failed to report pipeline results to FlowCI"
