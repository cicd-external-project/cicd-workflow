name: FlowCI Package
on:
  workflow_run:
    workflows:
      - FlowCI Quality
    types:
      - completed
  workflow_dispatch: {}
permissions:
  contents: read
  packages: write
env:
  CI_VALIDATE_URL: https://flowci-be-test.onrender.com/api/v1/ci/validate
  CI_REPORT_URL: ${{ secrets.CI_REPORT_URL }}
jobs:
  validate-access:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate FlowCI access
        run: |
          RESPONSE=$(curl -sf -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CI_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"${{ github.repository }}\",\"stage\":\"package\",\"workflowRunId\":\"${{ github.run_id }}\",\"headSha\":\"${{ github.event.workflow_run.head_sha || github.sha }}\"}" \
            "$CI_VALIDATE_URL") || true
          HTTP_CODE=$(printf '%s' "$RESPONSE" | tail -1)
          BODY=$(printf '%s' "$RESPONSE" | head -n -1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::FlowCI authorization failed (HTTP $HTTP_CODE). ${BODY}"
            exit 1
          fi
          echo "FlowCI authorization validated."
  build:
    needs:
      - validate-access
    if: ${{ (github.event.workflow_run.head_branch || github.ref_name) == 'test' || (github.event.workflow_run.head_branch || github.ref_name) == 'uat' || (github.event.workflow_run.head_branch || github.ref_name) == 'main' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./.
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: if [ -f package-lock.json ]; then npm ci --ignore-scripts; else npm install --ignore-scripts; fi
      - run: npm run build
  production-gate:
    needs:
      - build
    if: ${{ (github.event.workflow_run.head_branch || github.ref_name) == 'main' }}
    uses: cicd-external-project/cicd-workflow/.github/workflows/production-gate.yml@v1
    with:
      system-dir: flowci-demo-backend
      app-type: api
      require-approval: false
  deploy-render:
    needs:
      - build
      - production-gate
    if: ${{ !cancelled() && needs.build.result == 'success' && ((github.event.workflow_run.head_branch || github.ref_name) == 'test' || (github.event.workflow_run.head_branch || github.ref_name) == 'uat' || ((github.event.workflow_run.head_branch || github.ref_name) == 'main' && needs.production-gate.result == 'success')) }}
    uses: cicd-external-project/cicd-workflow/.github/workflows/render-deploy.yml@v1
    with:
      system-name: flowci-demo-backend
      environment: ${{ (github.event.workflow_run.head_branch || github.ref_name) == 'main' && 'production' || (github.event.workflow_run.head_branch || github.ref_name) }}
      branch: ${{ github.event.workflow_run.head_branch || github.ref_name }}
    secrets: inherit
  promote-to-uat:
    permissions:
      contents: read
      pull-requests: write
    needs:
      - build
      - deploy-render
    if: ${{ !cancelled() && (github.event.workflow_run.head_branch || github.ref_name) == 'test' && needs.build.result == 'success' && (needs.deploy-render.result == 'success' || needs.deploy-render.result == 'skipped') }}
    uses: cicd-external-project/cicd-workflow/.github/workflows/promotion.yml@v1
    with:
      pipeline-kind: single
      direction: test-to-uat
      system1-name: flowci-demo-backend
      pipeline-result: success
    secrets:
      PR_TOKEN: ${{ secrets.GH_PR_TOKEN != '' && secrets.GH_PR_TOKEN || github.token }}
  promote-to-main:
    permissions:
      contents: read
      pull-requests: write
    needs:
      - build
      - deploy-render
    if: ${{ !cancelled() && (github.event.workflow_run.head_branch || github.ref_name) == 'uat' && needs.build.result == 'success' && (needs.deploy-render.result == 'success' || needs.deploy-render.result == 'skipped') }}
    uses: cicd-external-project/cicd-workflow/.github/workflows/promotion.yml@v1
    with:
      pipeline-kind: single
      direction: uat-to-main
      system1-name: flowci-demo-backend
      pipeline-result: success
    secrets:
      PR_TOKEN: ${{ secrets.GH_PR_TOKEN != '' && secrets.GH_PR_TOKEN || github.token }}
  report-results:
    if: ${{ always() }}
    needs:
      - validate-access
      - build
    runs-on: ubuntu-latest
    env:
      CI_TOKEN: ${{ secrets.CI_TOKEN }}
      CI_REPORT_URL: ${{ secrets.CI_REPORT_URL }}
    steps:
      - name: Report stage results to FlowCI
        env:
          CI_TOKEN: ${{ secrets.CI_TOKEN }}
          CI_REPORT_URL: ${{ secrets.CI_REPORT_URL }}
          GH_REPO: ${{ github.repository }}
          GH_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          GH_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          GH_RUN_ID: ${{ github.run_id }}
          STAGE_FAILED: ${{ contains(needs.*.result, 'failure') }}
          STAGE_CANCELLED: ${{ contains(needs.*.result, 'cancelled') }}
        run: |
          # Derive stage conclusion from upstream needs results
          if [ "$STAGE_FAILED" = "true" ]; then
            CONCLUSION="failure"
          elif [ "$STAGE_CANCELLED" = "true" ]; then
            CONCLUSION="cancelled"
          else
            CONCLUSION="success"
          fi

          # Build results sub-object (quality stage only — reads from job outputs)
          RESULTS="{}"

          # Build and POST the payload with jq — no string interpolation of context values
          PAYLOAD=$(jq -n \
            --arg repo     "$GH_REPO" \
            --arg branch   "$GH_BRANCH" \
            --arg sha      "$GH_SHA" \
            --argjson runId "$GH_RUN_ID" \
            --arg stage    "package" \
            --arg conclusion "$CONCLUSION" \
            --argjson results "$RESULTS" \
            '{repoFullName:$repo,branch:$branch,commitSha:$sha,runId:$runId,stage:$stage,conclusion:$conclusion,results:$results}')
          curl -sf --max-time 5 \
            -X POST "$CI_REPORT_URL" \
            -H "Authorization: Bearer $CI_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            || echo "::warning::Failed to report pipeline results to FlowCI"
