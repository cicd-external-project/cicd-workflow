# Granular frontend Next.js workflow.
# Copy to .github/workflows/frontend-ci.yml in a consumer repository.

name: "Frontend CI"

on:
  push:
    branches: [test, uat, main]
  pull_request:
    branches: [test, uat, main]
  workflow_dispatch:
    inputs:
      service_name:
        description: "Service name for display and artifacts"
        required: true
        type: string
        default: "frontend"
      service_path:
        description: "Relative path to the frontend service"
        required: false
        type: string
        default: "."
      node_version:
        description: "Node.js version"
        required: false
        type: number
        default: 24
      coverage_threshold:
        description: "Minimum coverage percentage"
        required: false
        type: number
        default: 80
      enforce_coverage:
        description: "Fail when coverage is below threshold or missing"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write

jobs:
  validate-access:
    uses: Tone-Lloyd-Sir-Catubag-CICD/central-workflow/.github/workflows/validate-subscription.yml@v1
    secrets:
      CI_TOKEN: ${{ secrets.CI_TOKEN }}

  unit-tests:
    needs: validate-access
    uses: Tone-Lloyd-Sir-Catubag-CICD/central-workflow/.github/workflows/frontend-tests.yml@v1
    with:
      working-directory: ${{ inputs.service_path || '.' }}
      system-name: ${{ inputs.service_name || 'frontend' }}
      node-version: ${{ inputs.node_version || 24 }}
      coverage-threshold: ${{ inputs.coverage_threshold || 80 }}
      enforce-coverage: ${{ inputs.enforce_coverage != false }}
      test-command: npm run test

  lint:
    needs: validate-access
    uses: Tone-Lloyd-Sir-Catubag-CICD/central-workflow/.github/workflows/lint-check.yml@v1
    with:
      working-directory: ${{ inputs.service_path || '.' }}
      system-name: ${{ inputs.service_name || 'frontend' }}
      node-version: ${{ inputs.node_version || 24 }}
      lint-command: npm run lint

  security:
    needs: validate-access
    uses: Tone-Lloyd-Sir-Catubag-CICD/central-workflow/.github/workflows/security-scan.yml@v1
    with:
      working-directory: ${{ inputs.service_path || '.' }}
      system-name: ${{ inputs.service_name || 'frontend' }}
      node-version: ${{ inputs.node_version || 24 }}
      fail-on-high: true

  build:
    needs: [validate-access, unit-tests, lint, security]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./${{ inputs.service_path || '.' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version || 24 }}
          cache: npm
          cache-dependency-path: "**/package-lock.json"
      - run: npm ci --ignore-scripts
      - run: npm run build

