# Granular backend Node.js workflow.
# Copy to .github/workflows/backend-ci.yml in a consumer repository.

name: "Backend CI"

on:
  push:
    branches: [test, uat, main]
  pull_request:
    branches: [test, uat, main]
  workflow_dispatch:
    inputs:
      service_name:
        description: "Service name for display and artifacts"
        required: true
        type: string
        default: "backend"
      service_path:
        description: "Relative path to the backend service"
        required: false
        type: string
        default: "."
      node_version:
        description: "Node.js version"
        required: false
        type: number
        default: 24
      coverage_threshold:
        description: "Minimum coverage percentage"
        required: false
        type: number
        default: 80
      enforce_coverage:
        description: "Fail when coverage is below threshold or missing"
        required: false
        type: boolean
        default: true
      docker_image:
        description: "Optional image name. Leave empty to skip Docker build."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write
  security-events: write

env:
  CI_VALIDATE_URL: https://api.implementsprint.com/v1/ci/validate

jobs:
  validate-access:
    uses: Tone-Lloyd-Sir-Catubag-CICD/central-workflow/.github/workflows/validate-subscription.yml@v1
    with:
      validation-api-url: ${{ env.CI_VALIDATE_URL }}
    secrets:
      CI_TOKEN: ${{ secrets.CI_TOKEN }}

  unit-tests:
    needs: validate-access
    uses: Tone-Lloyd-Sir-Catubag-CICD/central-workflow/.github/workflows/backend-tests.yml@v1
    with:
      working-directory: ${{ inputs.service_path || '.' }}
      system-name: ${{ inputs.service_name || 'backend' }}
      backend-stack: nodejs
      node-version: ${{ inputs.node_version || 24 }}
      coverage-threshold: ${{ inputs.coverage_threshold || 80 }}
      enforce-coverage: ${{ inputs.enforce_coverage != false }}

  lint:
    needs: validate-access
    uses: Tone-Lloyd-Sir-Catubag-CICD/central-workflow/.github/workflows/lint-check.yml@v1
    with:
      working-directory: ${{ inputs.service_path || '.' }}
      system-name: ${{ inputs.service_name || 'backend' }}
      node-version: ${{ inputs.node_version || 24 }}

  security:
    needs: validate-access
    uses: Tone-Lloyd-Sir-Catubag-CICD/central-workflow/.github/workflows/security-scan.yml@v1
    with:
      working-directory: ${{ inputs.service_path || '.' }}
      system-name: ${{ inputs.service_name || 'backend' }}
      node-version: ${{ inputs.node_version || 24 }}
      fail-on-high: true

  docker:
    needs: [validate-access, unit-tests, lint, security]
    if: ${{ inputs.docker_image != '' }}
    uses: Tone-Lloyd-Sir-Catubag-CICD/central-workflow/.github/workflows/docker-build.yml@v1
    with:
      working-directory: ${{ inputs.service_path || '.' }}
      image-name: ${{ inputs.docker_image }}
      push-image: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
      scan-vulnerabilities: true

