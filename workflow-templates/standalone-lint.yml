# Granular standalone lint workflow.
# Copy to .github/workflows/lint.yml in a consumer repository.

name: "Lint"

on:
  push:
    branches: [test, uat, main]
  pull_request:
    branches: [test, uat, main]
  workflow_dispatch:
    inputs:
      service_name:
        description: "Service name for display"
        required: true
        type: string
        default: "app"
      service_path:
        description: "Relative path to the service"
        required: false
        type: string
        default: "."
      node_version:
        description: "Node.js version"
        required: false
        type: number
        default: 24

permissions:
  contents: read

env:
  CI_VALIDATE_URL: https://api.implementsprint.com/v1/ci/validate

jobs:
  validate-access:
    uses: cicd-external-project/cicd-workflow/.github/workflows/validate-subscription.yml@feature/migrate-vercel-render-to-gcp
    with:
      validation-api-url: ${{ env.CI_VALIDATE_URL }}
    secrets:
      CI_TOKEN: ${{ secrets.CI_TOKEN }}

  lint:
    needs: validate-access
    uses: cicd-external-project/cicd-workflow/.github/workflows/lint-check.yml@feature/migrate-vercel-render-to-gcp
    with:
      working-directory: ${{ inputs.service_path || '.' }}
      system-name: ${{ inputs.service_name || 'app' }}
      node-version: ${{ inputs.node_version || 24 }}
