# Granular standalone lint workflow.
# Copy to .github/workflows/lint.yml in a consumer repository.

name: "Lint"

on:
  push:
    branches: [test, uat, main]
  pull_request:
    branches: [test, uat, main]
  workflow_dispatch:
    inputs:
      service_name:
        description: "Service name for display"
        required: true
        type: string
        default: "app"
      service_path:
        description: "Relative path to the service"
        required: false
        type: string
        default: "."
      node_version:
        description: "Node.js version"
        required: false
        type: number
        default: 20

permissions:
  contents: read

jobs:
  lint:
    uses: Tone-Lloyd-Sir-Catubag-CICD/central-workflow/.github/workflows/lint-check.yml@v1
    with:
      working-directory: ${{ inputs.service_path || '.' }}
      system-name: ${{ inputs.service_name || 'app' }}
      node-version: ${{ inputs.node_version || 20 }}

