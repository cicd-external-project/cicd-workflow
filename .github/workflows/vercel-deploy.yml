# Contract: docs/workflows/vercel-deploy.md
name: "Reusable: Vercel Deploy"

on:
  workflow_call:
    inputs:
      system-name:
        required: true
        type: string
        description: "System name for display"
      working-directory:
        required: false
        type: string
        default: "."
        description: "Project directory"
      checkout-ref:
        required: false
        type: string
        default: ""
        description: "Optional git ref/SHA to checkout, used by workflow_run chains"
      environment:
        required: false
        type: string
        default: "preview"
        description: "Vercel environment: preview or production"
    secrets:
      VERCEL_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROJECT_ID:
        required: true

permissions:
  contents: read

jobs:
  vercel-deploy:
    name: "Deploy ${{ inputs.system-name }} to Vercel"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./${{ inputs.working-directory }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_ENVIRONMENT: ${{ inputs.environment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: |
            **/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: |
          if [ "${VERCEL_ENVIRONMENT}" = "production" ]; then
            vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"
          else
            vercel pull --yes --environment=preview --token="${VERCEL_TOKEN}"
          fi

      - name: Build Vercel App
        run: |
          if [ "${VERCEL_ENVIRONMENT}" = "production" ]; then
            vercel build --prod --token="${VERCEL_TOKEN}"
          else
            vercel build --token="${VERCEL_TOKEN}"
          fi

      - name: Deploy Prebuilt Vercel App
        run: |
          if [ "${VERCEL_ENVIRONMENT}" = "production" ]; then
            vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
          else
            vercel deploy --prebuilt --token="${VERCEL_TOKEN}"
          fi
