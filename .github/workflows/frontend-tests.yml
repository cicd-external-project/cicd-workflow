# Contract: docs/workflows/frontend-tests.md
name: "Reusable: Frontend Unit Tests"

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: "."
        description: "Project directory (e.g. BayaniHub-Web, or '.' for root)"
      system-name:
        required: true
        type: string
        description: "System name for artifacts/display (e.g. BayaniHub-Web)"
      node-version:
        required: false
        type: number
        default: 24
        description: "Node.js version"
      test-command:
        required: false
        type: string
        default: "npm run test -- --coverage --coverageReporters=json-summary tests/unit"
        description: "Test command to execute"
      unit-tests-directory:
        required: false
        type: string
        default: "tests/unit"
        description: "Folder that contains unit tests"
      coverage-threshold:
        required: false
        type: number
        default: 80
        description: "Minimum coverage percentage"
      enforce-coverage:
        required: false
        type: boolean
        default: true
        description: "Fail when coverage is below threshold or missing"
      upload-artifact:
        required: false
        type: boolean
        default: true
        description: "Upload coverage artifact"
      checkout-ref:
        required: false
        type: string
        default: ""
        description: "Optional git ref/SHA to checkout, used by workflow_run chains"
    outputs:
      test-result:
        description: "Test pass/fail result"
        value: ${{ jobs.frontend-unit-tests.outputs.result }}
      coverage-percent:
        description: "Code coverage percentage"
        value: ${{ jobs.frontend-unit-tests.outputs.coverage }}

permissions:
  contents: read

jobs:
  frontend-unit-tests:
    name: "Frontend Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      result: ${{ steps.test-run.outcome }}
      coverage: ${{ steps.coverage-check.outputs.coverage }}
    defaults:
      run:
        working-directory: ./${{ inputs.working-directory }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.sha }}

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: |
            **/package-lock.json

      - name: Validate unit tests folder exists
        env:
          UNIT_TESTS_DIRECTORY: ${{ inputs.unit-tests-directory }}
        run: |
          if [ ! -d "${UNIT_TESTS_DIRECTORY}" ]; then
            echo "Unit tests folder not found: ${UNIT_TESTS_DIRECTORY}"
            echo "Expected unit tests under ${UNIT_TESTS_DIRECTORY}."
            exit 1
          fi
          echo "Unit tests folder found: ${UNIT_TESTS_DIRECTORY}"

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Run Unit Tests with Coverage
        id: test-run
        run: ${{ inputs.test-command }}

      - name: Parse Coverage Report
        id: coverage-check
        if: always()
        env:
          ENFORCE_COVERAGE: ${{ inputs.enforce-coverage }}
          THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          if [ -f "coverage/coverage-summary.json" ]; then
            METRICS=$(node -e "
              const data = require('./coverage/coverage-summary.json');
              const total = data.total || {};
              const lines = total.lines?.pct;
              const functions = total.functions?.pct;
              const branches = total.branches?.pct;
              const statements = total.statements?.pct;
              if ([lines, functions, branches, statements].some(v => typeof v !== 'number' || Number.isNaN(v))) {
                throw new Error('coverage-summary.json is missing one or more required numeric metrics (lines/functions/branches/statements).');
              }
              console.log([lines, functions, branches, statements].join(' '));
            ")
            read -r LINES_COVERAGE FUNCTIONS_COVERAGE BRANCHES_COVERAGE STATEMENTS_COVERAGE <<< "${METRICS}"

            echo "coverage=$LINES_COVERAGE" >> "$GITHUB_OUTPUT"
            echo "Coverage - lines: ${LINES_COVERAGE}%, functions: ${FUNCTIONS_COVERAGE}%, branches: ${BRANCHES_COVERAGE}%, statements: ${STATEMENTS_COVERAGE}%"

            if [ "${ENFORCE_COVERAGE}" != "true" ]; then
              echo "Coverage threshold enforcement disabled"
              exit 0
            fi

            LINES_COVERAGE="${LINES_COVERAGE}" \
            FUNCTIONS_COVERAGE="${FUNCTIONS_COVERAGE}" \
            BRANCHES_COVERAGE="${BRANCHES_COVERAGE}" \
            STATEMENTS_COVERAGE="${STATEMENTS_COVERAGE}" \
            THRESHOLD="${THRESHOLD}" \
            node -e "
              const threshold = Number(process.env.THRESHOLD);
              const metrics = {
                lines: Number(process.env.LINES_COVERAGE),
                functions: Number(process.env.FUNCTIONS_COVERAGE),
                branches: Number(process.env.BRANCHES_COVERAGE),
                statements: Number(process.env.STATEMENTS_COVERAGE),
              };
              const failing = Object.entries(metrics).filter(([, value]) => value < threshold);
              if (failing.length > 0) {
                console.error('Coverage is below threshold ' + threshold + '%: ' + failing.map(([name, value]) => name + '=' + value + '%').join(', '));
                process.exit(1);
              }
              console.log('Coverage meets threshold ' + threshold + '% for lines/functions/branches/statements');
            "
          else
            echo "coverage=unknown" >> "$GITHUB_OUTPUT"
            if [ "${ENFORCE_COVERAGE}" = "true" ]; then
              echo "coverage/coverage-summary.json not found - failing coverage gate"
              exit 1
            fi
            echo "coverage/coverage-summary.json not found - coverage gate disabled"
          fi

      - name: Upload Coverage Artifact
        if: ${{ inputs.upload-artifact && always() }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.system-name }}-coverage
          path: ${{ inputs.working-directory }}/coverage
          retention-days: 14

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.system-name }}-test-results
          path: |
            ${{ inputs.working-directory }}/coverage/coverage-summary.json
            ${{ inputs.working-directory }}/test-results/
          retention-days: 7
          if-no-files-found: ignore


