          fi

      - name: Run Contract Tests
        env:
          CI: "true"
        run: |
          echo "Running contract tests for ${{ inputs.service-name }}..."
          bash -lc "${{ inputs.contract-test-command }}"

  e2e-tests:
    name: "End-to-End Tests"
    if: ${{ inputs.e2e-test-command != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
