name: "Reusable: JavaScript Quality Core"

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Display name for the service"
      service-path:
        required: false
        type: string
        default: "."
        description: "Directory that contains the service"
      stack-name:
        required: false
        type: string
        default: "javascript"
        description: "Stack label used in artifacts and cache keys"
      node-version:
        required: false
        type: string
        default: "24"
        description: "Node.js version"
      package-manager:
        required: false
        type: string
        default: "auto"
        description: "Package manager override (auto|npm|yarn|pnpm)"
      install-command:
        required: false
        type: string
        default: ""
        description: "Optional install command override"
      lint-command:
        required: false
        type: string
        default: ""
        description: "Lint command"
      format-command:
        required: false
        type: string
        default: ""
        description: "Format validation command"
      typecheck-command:
        required: false
        type: string
        default: ""
        description: "Type-check command"
      unit-test-command:
        required: false
        type: string
        default: ""
        description: "Unit test command"
      integration-test-command:
        required: false
        type: string
        default: ""
        description: "Integration test command"
      component-test-command:
        required: false
        type: string
        default: ""
        description: "Component test command"
      contract-test-command:
        required: false
        type: string
        default: ""
        description: "Contract test command"
      e2e-test-command:
        required: false
        type: string
        default: ""
        description: "End-to-end test command"
      build-command:
        required: false
        type: string
        default: ""
        description: "Build command"
      build-output-path:
        required: false
        type: string
        default: ""
        description: "Build output folder or file"
      build-cache-path:
        required: false
        type: string
        default: ""
        description: "Optional build cache path (for example .next/cache)"
      coverage-summary-path:
        required: false
        type: string
        default: "coverage/coverage-summary.json"
        description: "Coverage summary JSON path"
      coverage-threshold:
        required: false
        type: number
        default: 80
        description: "Minimum line coverage percentage"
      enable-dependency-review:
        required: false
        type: boolean
        default: false
        description: "Run GitHub dependency review on pull requests"
      enable-audit:
        required: false
        type: boolean
        default: true
        description: "Run dependency audit"
      custom-audit-command:
        required: false
        type: string
        default: ""
        description: "Optional audit command override"
      enable-license-check:
        required: false
        type: boolean
        default: true
        description: "Run license compliance check"
      forbidden-licenses:
        required: false
        type: string
        default: "GPL-1.0;GPL-1.0-only;GPL-1.0-or-later;GPL-2.0;GPL-2.0-only;GPL-2.0-or-later;GPL-3.0;GPL-3.0-only;GPL-3.0-or-later;AGPL-1.0;AGPL-1.0-only;AGPL-1.0-or-later;AGPL-3.0;AGPL-3.0-only;AGPL-3.0-or-later;SSPL-1.0;BUSL-1.1;CC-BY-NC-4.0;CC-BY-NC-SA-4.0"
        description: "Semicolon-delimited DENY list (copyleft/non-commercial). The check fails only when a dependency actually uses one of these licenses; unlicensed/UNKNOWN packages (e.g. the project's own root package) do NOT fail the build."
      enable-attestation:
        required: false
        type: boolean
        default: false
        description: "Generate build provenance attestations for the build output"
    outputs:
      build-artifact-name:
        description: "Uploaded build artifact name"
        value: ${{ jobs.build.outputs.artifact-name }}
      build-result:
        description: "Build job result"
        value: ${{ jobs.build.outputs.build-result }}

permissions:
  contents: read

jobs:
  dependency-review:
    name: "Dependency Review"
    if: ${{ github.event_name == 'pull_request' && inputs.enable-dependency-review }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Review Dependency Changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          vulnerability-check: true
          deny-licenses: ${{ inputs.forbidden-licenses }}

  static-analysis:
    name: "Static Analysis"
    if: ${{ inputs.lint-command != '' || inputs.format-command != '' || inputs.typecheck-command != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./${{ inputs.service-path }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Detect Package Manager
        id: package-manager
        run: |
          INPUT_PM="${{ inputs.package-manager }}"
          if [ -n "${INPUT_PM}" ] && [ "${INPUT_PM}" != "auto" ]; then
            PM="${INPUT_PM}"
          elif [ -f "pnpm-lock.yaml" ]; then
            PM="pnpm"
          elif [ -f "yarn.lock" ]; then
            PM="yarn"
          elif [ -f "package-lock.json" ] || [ -f "npm-shrinkwrap.json" ] || [ -f "package.json" ]; then
            PM="npm"
          else
            echo "❌ package.json is required in ${{ inputs.service-path }}."
            exit 1
          fi

          case "${PM}" in
            npm|yarn|pnpm) ;;
            *)
              echo "❌ Unsupported package manager: ${PM}"
              exit 1
              ;;
          esac

          echo "manager=${PM}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.package-manager.outputs.manager }}
          cache-dependency-path: |
            ${{ inputs.service-path }}/package-lock.json
            ${{ inputs.service-path }}/npm-shrinkwrap.json
            ${{ inputs.service-path }}/yarn.lock
            ${{ inputs.service-path }}/pnpm-lock.yaml

      - name: Install Dependencies
        env:
          CUSTOM_INSTALL_COMMAND: ${{ inputs.install-command }}
          PACKAGE_MANAGER: ${{ steps.package-manager.outputs.manager }}
        run: |
          if [ -n "${CUSTOM_INSTALL_COMMAND}" ]; then
            bash -lc "${CUSTOM_INSTALL_COMMAND}"
          elif [ "${PACKAGE_MANAGER}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ "${PACKAGE_MANAGER}" = "yarn" ]; then
            corepack enable
            yarn install --immutable || yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Run Lint
        if: ${{ inputs.lint-command != '' }}
        run: |
          echo "Running lint for ${{ inputs.service-name }}..."
          bash -lc "${{ inputs.lint-command }}"

      - name: Run Format Validation
        if: ${{ inputs.format-command != '' }}
        run: |
          echo "Running format validation for ${{ inputs.service-name }}..."
          bash -lc "${{ inputs.format-command }}"

      - name: Run Type Check
        if: ${{ inputs.typecheck-command != '' }}
        run: |
          echo "Running type check for ${{ inputs.service-name }}..."
          bash -lc "${{ inputs.typecheck-command }}"

  unit-tests:
    name: "Unit Tests"
    if: ${{ inputs.unit-test-command != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./${{ inputs.service-path }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Detect Package Manager
        id: package-manager
        run: |
          INPUT_PM="${{ inputs.package-manager }}"
          if [ -n "${INPUT_PM}" ] && [ "${INPUT_PM}" != "auto" ]; then
            PM="${INPUT_PM}"
          elif [ -f "pnpm-lock.yaml" ]; then
            PM="pnpm"
          elif [ -f "yarn.lock" ]; then
            PM="yarn"
          elif [ -f "package-lock.json" ] || [ -f "npm-shrinkwrap.json" ] || [ -f "package.json" ]; then
            PM="npm"
          else
            echo "❌ package.json is required in ${{ inputs.service-path }}."
            exit 1
          fi

          case "${PM}" in
            npm|yarn|pnpm) ;;
            *)
              echo "❌ Unsupported package manager: ${PM}"
              exit 1
              ;;
          esac

          echo "manager=${PM}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.package-manager.outputs.manager }}
          cache-dependency-path: |
            ${{ inputs.service-path }}/package-lock.json
            ${{ inputs.service-path }}/npm-shrinkwrap.json
            ${{ inputs.service-path }}/yarn.lock
            ${{ inputs.service-path }}/pnpm-lock.yaml

      - name: Install Dependencies
        env:
          CUSTOM_INSTALL_COMMAND: ${{ inputs.install-command }}
          PACKAGE_MANAGER: ${{ steps.package-manager.outputs.manager }}
        run: |
          if [ -n "${CUSTOM_INSTALL_COMMAND}" ]; then
            bash -lc "${CUSTOM_INSTALL_COMMAND}"
          elif [ "${PACKAGE_MANAGER}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ "${PACKAGE_MANAGER}" = "yarn" ]; then
            corepack enable
            yarn install --immutable || yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Run Unit Tests
        env:
          CI: "true"
        run: |
          echo "Running unit tests for ${{ inputs.service-name }}..."
          bash -lc "${{ inputs.unit-test-command }}"

      - name: Enforce Coverage Threshold
        env:
          COVERAGE_SUMMARY_PATH: ${{ inputs.coverage-summary-path }}
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          if [ ! -f "${COVERAGE_SUMMARY_PATH}" ]; then
            echo "❌ Coverage summary not found: ${COVERAGE_SUMMARY_PATH}"
            exit 1
          fi

          COVERAGE=$(node -e "const fs=require('fs'); const p=process.env.COVERAGE_SUMMARY_PATH; const data=JSON.parse(fs.readFileSync(p,'utf8')); const pct=data?.total?.lines?.pct; if(typeof pct !== 'number'){throw new Error('Missing total.lines.pct in coverage summary.');} console.log(pct);")
          echo "Coverage: ${COVERAGE}%"

          node -e "const coverage=Number(process.argv[1]); const threshold=Number(process.argv[2]); if (!Number.isFinite(coverage)) { process.exit(2); } if (coverage < threshold) { process.exit(1); }" "${COVERAGE}" "${COVERAGE_THRESHOLD}"

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.service-name }}-${{ inputs.stack-name }}-coverage
          path: ${{ inputs.service-path }}/coverage
          retention-days: 14
          if-no-files-found: ignore

  integration-tests:
    name: "Integration Tests"
    if: ${{ inputs.integration-test-command != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./${{ inputs.service-path }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Detect Package Manager
        id: package-manager
        run: |
          INPUT_PM="${{ inputs.package-manager }}"
          if [ -n "${INPUT_PM}" ] && [ "${INPUT_PM}" != "auto" ]; then
