          fi

      - name: Run End-to-End Tests
        env:
          CI: "true"
        run: |
          echo "Running end-to-end tests for ${{ inputs.service-name }}..."
          bash -lc "${{ inputs.e2e-test-command }}"

  dependency-audit:
    name: "Dependency Audit"
    if: ${{ inputs.enable-audit }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./${{ inputs.service-path }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Detect Package Manager
        id: package-manager
        run: |
          INPUT_PM="${{ inputs.package-manager }}"
          if [ -n "${INPUT_PM}" ] && [ "${INPUT_PM}" != "auto" ]; then
            PM="${INPUT_PM}"
          elif [ -f "pnpm-lock.yaml" ]; then
            PM="pnpm"
          elif [ -f "yarn.lock" ]; then
            PM="yarn"
          elif [ -f "package-lock.json" ] || [ -f "npm-shrinkwrap.json" ] || [ -f "package.json" ]; then
            PM="npm"
          else
            echo "❌ package.json is required in ${{ inputs.service-path }}."
            exit 1
          fi

          echo "manager=${PM}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.package-manager.outputs.manager }}
          cache-dependency-path: |
            ${{ inputs.service-path }}/package-lock.json
            ${{ inputs.service-path }}/npm-shrinkwrap.json
            ${{ inputs.service-path }}/yarn.lock
            ${{ inputs.service-path }}/pnpm-lock.yaml

      - name: Install Dependencies
        env:
          CUSTOM_INSTALL_COMMAND: ${{ inputs.install-command }}
          PACKAGE_MANAGER: ${{ steps.package-manager.outputs.manager }}
        run: |
          if [ -n "${CUSTOM_INSTALL_COMMAND}" ]; then
            bash -lc "${CUSTOM_INSTALL_COMMAND}"
          elif [ "${PACKAGE_MANAGER}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ "${PACKAGE_MANAGER}" = "yarn" ]; then
            corepack enable
            yarn install --immutable || yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Run Dependency Audit
        env:
          PACKAGE_MANAGER: ${{ steps.package-manager.outputs.manager }}
          CUSTOM_AUDIT_COMMAND: ${{ inputs.custom-audit-command }}
        run: |
          set +e

          if [ -n "${CUSTOM_AUDIT_COMMAND}" ]; then
            bash -lc "${CUSTOM_AUDIT_COMMAND}" 2>&1 | tee audit-report.txt
            AUDIT_EXIT=${PIPESTATUS[0]}
          else
            case "${PACKAGE_MANAGER}" in
              pnpm)
                pnpm audit --audit-level=high 2>&1 | tee audit-report.txt
                AUDIT_EXIT=${PIPESTATUS[0]}
                ;;
              yarn)
                if yarn npm audit --help >/dev/null 2>&1; then
                  yarn npm audit --all --recursive --severity high 2>&1 | tee audit-report.txt
                  AUDIT_EXIT=${PIPESTATUS[0]}
                else
                  yarn audit --level high 2>&1 | tee audit-report.txt
                  AUDIT_EXIT=${PIPESTATUS[0]}
                fi
                ;;
              *)
                npm audit --audit-level=high 2>&1 | tee audit-report.txt
                AUDIT_EXIT=${PIPESTATUS[0]}
                ;;
            esac
          fi

          set -e

          if [ "${AUDIT_EXIT}" -ne 0 ]; then
            echo "❌ Dependency audit failed."
            exit "${AUDIT_EXIT}"
          fi

          echo "✅ Dependency audit passed."

      - name: Upload Audit Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.service-name }}-${{ inputs.stack-name }}-audit
          path: ${{ inputs.service-path }}/audit-report.txt
          retention-days: 14
          if-no-files-found: ignore

  license-check:
    name: "License Compliance"
    if: ${{ inputs.enable-license-check }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./${{ inputs.service-path }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Detect Package Manager
        id: package-manager
        run: |
          INPUT_PM="${{ inputs.package-manager }}"
          if [ -n "${INPUT_PM}" ] && [ "${INPUT_PM}" != "auto" ]; then
            PM="${INPUT_PM}"
          elif [ -f "pnpm-lock.yaml" ]; then
            PM="pnpm"
          elif [ -f "yarn.lock" ]; then
            PM="yarn"
          elif [ -f "package-lock.json" ] || [ -f "npm-shrinkwrap.json" ] || [ -f "package.json" ]; then
            PM="npm"
          else
            echo "❌ package.json is required in ${{ inputs.service-path }}."
            exit 1
          fi

          echo "manager=${PM}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.package-manager.outputs.manager }}
          cache-dependency-path: |
            ${{ inputs.service-path }}/package-lock.json
            ${{ inputs.service-path }}/npm-shrinkwrap.json
            ${{ inputs.service-path }}/yarn.lock
            ${{ inputs.service-path }}/pnpm-lock.yaml

      - name: Install Dependencies
        env:
          CUSTOM_INSTALL_COMMAND: ${{ inputs.install-command }}
          PACKAGE_MANAGER: ${{ steps.package-manager.outputs.manager }}
        run: |
          if [ -n "${CUSTOM_INSTALL_COMMAND}" ]; then
            bash -lc "${CUSTOM_INSTALL_COMMAND}"
          elif [ "${PACKAGE_MANAGER}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ "${PACKAGE_MANAGER}" = "yarn" ]; then
            corepack enable
            yarn install --immutable || yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Validate Licenses
        env:
          FORBIDDEN_LICENSES: ${{ inputs.forbidden-licenses }}
        run: |
          # Print the full license summary for visibility (never fails the build).
          npx license-checker --production --excludePrivatePackages --summary || true
          # Fail ONLY when a dependency actually uses a forbidden (copyleft /
          # non-commercial) license. Unlicensed / UNKNOWN packages — including
          # the project's own root package when it omits a "license" field — do
          # not fail the build.
          if [ -n "${FORBIDDEN_LICENSES}" ]; then
            npx license-checker --production --excludePrivatePackages --failOn "${FORBIDDEN_LICENSES}"
            echo "✅ No forbidden (copyleft/non-commercial) licenses found"
          fi

  build:
    name: "Build"
    if: >-
      always() &&
      inputs.build-command != '' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - dependency-review
      - static-analysis
      - unit-tests
      - integration-tests
      - component-tests
      - contract-tests
      - e2e-tests
      - dependency-audit
      - license-check
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      artifact-name: ${{ steps.artifact-metadata.outputs.name }}
      build-result: ${{ steps.build-finished.outputs.result }}
    defaults:
      run:
        working-directory: ./${{ inputs.service-path }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Detect Package Manager
        id: package-manager
        run: |
          INPUT_PM="${{ inputs.package-manager }}"
          if [ -n "${INPUT_PM}" ] && [ "${INPUT_PM}" != "auto" ]; then
            PM="${INPUT_PM}"
          elif [ -f "pnpm-lock.yaml" ]; then
            PM="pnpm"
          elif [ -f "yarn.lock" ]; then
            PM="yarn"
          elif [ -f "package-lock.json" ] || [ -f "npm-shrinkwrap.json" ] || [ -f "package.json" ]; then
            PM="npm"
          else
            echo "❌ package.json is required in ${{ inputs.service-path }}."
            exit 1
          fi

          echo "manager=${PM}" >> "$GITHUB_OUTPUT"

      - name: Restore Build Cache
        if: ${{ inputs.build-cache-path != '' }}
        uses: actions/cache@v4
        with:
          path: ${{ inputs.service-path }}/${{ inputs.build-cache-path }}
          key: ${{ runner.os }}-${{ inputs.stack-name }}-${{ hashFiles('**/package-lock.json', '**/npm-shrinkwrap.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-${{ inputs.stack-name }}-${{ hashFiles('**/package-lock.json', '**/npm-shrinkwrap.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}-

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.package-manager.outputs.manager }}
          cache-dependency-path: |
            ${{ inputs.service-path }}/package-lock.json
            ${{ inputs.service-path }}/npm-shrinkwrap.json
            ${{ inputs.service-path }}/yarn.lock
            ${{ inputs.service-path }}/pnpm-lock.yaml

      - name: Install Dependencies
        env:
          CUSTOM_INSTALL_COMMAND: ${{ inputs.install-command }}
          PACKAGE_MANAGER: ${{ steps.package-manager.outputs.manager }}
        run: |
          if [ -n "${CUSTOM_INSTALL_COMMAND}" ]; then
            bash -lc "${CUSTOM_INSTALL_COMMAND}"
          elif [ "${PACKAGE_MANAGER}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ "${PACKAGE_MANAGER}" = "yarn" ]; then
            corepack enable
            yarn install --immutable || yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Build Service
        run: |
          echo "Building ${{ inputs.service-name }}..."
          bash -lc "${{ inputs.build-command }}"

      - name: Set Artifact Metadata
        id: artifact-metadata
        run: |
          ARTIFACT_NAME="${{ inputs.service-name }}-${{ inputs.stack-name }}-build"
          echo "name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate Build Attestation
        if: ${{ inputs.enable-attestation && inputs.build-output-path != '' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ github.workspace }}/${{ inputs.service-path }}/${{ inputs.build-output-path }}

      - name: Upload Build Artifact
        if: ${{ inputs.build-output-path != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact-metadata.outputs.name }}
          path: ${{ inputs.service-path }}/${{ inputs.build-output-path }}
          retention-days: 14
          if-no-files-found: error

      - name: Mark Build Result
        id: build-finished
        run: echo "result=success" >> "$GITHUB_OUTPUT"
