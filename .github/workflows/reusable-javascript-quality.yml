            ${{ inputs.service-path }}/npm-shrinkwrap.json
            ${{ inputs.service-path }}/yarn.lock
            ${{ inputs.service-path }}/pnpm-lock.yaml

      - name: Install Dependencies
        env:
          CUSTOM_INSTALL_COMMAND: ${{ inputs.install-command }}
          PACKAGE_MANAGER: ${{ steps.package-manager.outputs.manager }}
        run: |
          if [ -n "${CUSTOM_INSTALL_COMMAND}" ]; then
            bash -lc "${CUSTOM_INSTALL_COMMAND}"
          elif [ "${PACKAGE_MANAGER}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ "${PACKAGE_MANAGER}" = "yarn" ]; then
            corepack enable
            yarn install --immutable || yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Run Integration Tests
        env:
          CI: "true"
        run: |
          echo "Running integration tests for ${{ inputs.service-name }}..."
          bash -lc "${{ inputs.integration-test-command }}"

  component-tests:
    name: "Component Tests"
    if: ${{ inputs.component-test-command != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./${{ inputs.service-path }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Detect Package Manager
        id: package-manager
        run: |
          INPUT_PM="${{ inputs.package-manager }}"
          if [ -n "${INPUT_PM}" ] && [ "${INPUT_PM}" != "auto" ]; then
            PM="${INPUT_PM}"
          elif [ -f "pnpm-lock.yaml" ]; then
            PM="pnpm"
          elif [ -f "yarn.lock" ]; then
            PM="yarn"
          elif [ -f "package-lock.json" ] || [ -f "npm-shrinkwrap.json" ] || [ -f "package.json" ]; then
            PM="npm"
          else
            echo "❌ package.json is required in ${{ inputs.service-path }}."
            exit 1
          fi

          echo "manager=${PM}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.package-manager.outputs.manager }}
          cache-dependency-path: |
            ${{ inputs.service-path }}/package-lock.json
            ${{ inputs.service-path }}/npm-shrinkwrap.json
            ${{ inputs.service-path }}/yarn.lock
            ${{ inputs.service-path }}/pnpm-lock.yaml

      - name: Install Dependencies
        env:
          CUSTOM_INSTALL_COMMAND: ${{ inputs.install-command }}
          PACKAGE_MANAGER: ${{ steps.package-manager.outputs.manager }}
        run: |
          if [ -n "${CUSTOM_INSTALL_COMMAND}" ]; then
            bash -lc "${CUSTOM_INSTALL_COMMAND}"
          elif [ "${PACKAGE_MANAGER}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ "${PACKAGE_MANAGER}" = "yarn" ]; then
            corepack enable
            yarn install --immutable || yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Run Component Tests
        env:
          CI: "true"
        run: |
          echo "Running component tests for ${{ inputs.service-name }}..."
          bash -lc "${{ inputs.component-test-command }}"

  contract-tests:
    name: "Contract Tests"
    if: ${{ inputs.contract-test-command != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./${{ inputs.service-path }}
    steps:
      - name: Checkout Code
