name: "Reusable: Mobile Maestro iOS E2E"

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: "."
        description: "Project directory"
      system-name:
        required: true
        type: string
        description: "System name for display"
      node-version:
        required: false
        type: number
        default: 24
        description: "Node.js version"
      ios-build-command:
        required: false
        type: string
        default: ""
        description: "Optional custom command used to produce the iOS app binary for Maestro"
      maestro-test-command:
        required: false
        type: string
        default: "maestro test .maestro"
        description: "Command used to execute Maestro iOS tests"
      skip-build:
        required: false
        type: boolean
        default: false
        description: "Skip the app build step and use a pre-built artifact instead"
      build-artifact-name:
        required: false
        type: string
        default: ""
        description: "GitHub artifact name containing pre-built iOS simulator output (.app.zip)"
      ios-runner:
        required: false
        type: string
        default: "macos-15"
        description: "GitHub macOS runner label for iOS jobs"
      ios-xcode-version:
        required: false
        type: string
        default: "16.4"
        description: "Preferred Xcode version to select (e.g. 16.4)"
      ios-xcode-fallbacks:
        required: false
        type: string
        default: "16.3,16.2,26.2"
        description: "Comma-separated fallback Xcode versions"


permissions:
  contents: read

jobs:
  maestro-ios-e2e:
    name: "Maestro iOS E2E"
    runs-on: ${{ inputs.ios-runner }}
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ./${{ inputs.working-directory }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Detect package manager
        id: detect-pm
        run: |
          if [ -f "yarn.lock" ]; then
            echo "pm=yarn" >> "$GITHUB_OUTPUT"
          elif [ -f "pnpm-lock.yaml" ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f "package-lock.json" ] || [ -f "npm-shrinkwrap.json" ] || [ -f "package.json" ]; then
            echo "pm=npm" >> "$GITHUB_OUTPUT"
          else
            echo "❌ package.json is required for Maestro runs."
            exit 1
          fi

      - name: Setup Node.js ${{ inputs.node-version }} (npm)
        if: ${{ steps.detect-pm.outputs.pm == 'npm' }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: |
            **/package-lock.json

      - name: Setup Node.js ${{ inputs.node-version }} (yarn)
        if: ${{ steps.detect-pm.outputs.pm == 'yarn' }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: "yarn"
          cache-dependency-path: |
            **/yarn.lock

      - name: Setup Node.js ${{ inputs.node-version }} (pnpm)
        if: ${{ steps.detect-pm.outputs.pm == 'pnpm' }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: "pnpm"
          cache-dependency-path: |
            **/pnpm-lock.yaml

      - name: Install Dependencies
        env:
          PACKAGE_MANAGER: ${{ steps.detect-pm.outputs.pm }}
        run: |
          if [ "${PACKAGE_MANAGER}" = "yarn" ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ "${PACKAGE_MANAGER}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Validate Maestro workspace
        run: |
          if [ ! -d ".maestro" ]; then
            echo "❌ Required .maestro directory was not found."
            echo "Create .maestro and add at least one flow file before enabling Maestro CI."
            exit 1
          fi

          MAESTRO_FLOW_FILES=()
          while IFS= read -r -d '' f; do
            MAESTRO_FLOW_FILES+=("$f")
          done < <(find .maestro -type f \( -name "*.yaml" -o -name "*.yml" \) -print0)

          if [ "${#MAESTRO_FLOW_FILES[@]}" -eq 0 ]; then
            echo "❌ No Maestro flow files were found under .maestro/."
            echo "Add at least one .yaml or .yml flow file before enabling Maestro CI."
            exit 1
          fi

          echo "✅ Found ${#MAESTRO_FLOW_FILES[@]} Maestro flow file(s)."

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro --version

      - name: Select Xcode toolchain
        run: |
          sw_vers

          REQUESTED_XCODE="${{ inputs.ios-xcode-version }}"
          FALLBACK_XCODE_CSV="${{ inputs.ios-xcode-fallbacks }}"

          CANDIDATES=()
          if [ -n "${REQUESTED_XCODE}" ]; then
            CANDIDATES+=("/Applications/Xcode_${REQUESTED_XCODE}.app/Contents/Developer")
          fi

          IFS=',' read -ra FALLBACKS <<< "${FALLBACK_XCODE_CSV}"
          for ITEM in "${FALLBACKS[@]}"; do
            VERSION="$(echo "${ITEM}" | xargs)"
            if [ -n "${VERSION}" ]; then
              CANDIDATES+=("/Applications/Xcode_${VERSION}.app/Contents/Developer")
            fi
          done

          CANDIDATES+=("/Applications/Xcode.app/Contents/Developer")

          SELECTED=""
          for CANDIDATE in "${CANDIDATES[@]}"; do
            if [ -d "${CANDIDATE}" ]; then
              SELECTED="${CANDIDATE}"
              break
            fi
          done

          if [ -z "${SELECTED}" ]; then
            echo "❌ No supported Xcode installation found."
            ls -1 /Applications | grep -i Xcode || true
            exit 1
          fi

          echo "ℹ️ Requested Xcode: ${REQUESTED_XCODE}"
          echo "ℹ️ Fallback Xcode list: ${FALLBACK_XCODE_CSV}"
          echo "ℹ️ Selecting Xcode at ${SELECTED}"
          sudo xcode-select -s "${SELECTED}"
          xcodebuild -version

      - name: Download pre-built iOS artifact
        if: ${{ inputs.skip-build && inputs.build-artifact-name != '' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.build-artifact-name }}
          path: ${{ inputs.working-directory != '.' && format('{0}/{1}', github.workspace, inputs.working-directory) || github.workspace }}

      - name: Extract pre-built iOS artifact
        if: ${{ inputs.skip-build && inputs.build-artifact-name != '' }}
        run: |
          ZIP_FILE=$(find . -maxdepth 2 -type f \( -name "*.app.zip" -o -name "*-ios-simulator-app.zip" \) | head -n 1)
          DEST_DIR="ios/build/Build/Products/Debug-iphonesimulator"

          if [ -z "${ZIP_FILE}" ]; then
            ZIP_FILE=$(find . -maxdepth 2 -type f -name "*.zip" | head -n 1)
          fi

          if [ -n "${ZIP_FILE}" ]; then
            mkdir -p "${DEST_DIR}"
            unzip -o "${ZIP_FILE}" -d "${DEST_DIR}"
            rm -f "${ZIP_FILE}"
            echo "✅ Extracted pre-built iOS artifact into ${DEST_DIR}: ${ZIP_FILE}"
          else
            echo "❌ No iOS zip artifact found in downloaded artifact payload."
            exit 1
          fi

      - name: Ensure iOS Native Project
        if: ${{ !inputs.skip-build }}
        run: |
          if [ ! -d "ios" ]; then
            CI=1 npx expo prebuild --platform ios
          fi

      - name: Install CocoaPods Dependencies
        if: ${{ !inputs.skip-build && hashFiles(format('{0}/ios/Podfile', inputs.working-directory)) != '' }}
        run: |
          if command -v npx >/dev/null 2>&1; then
            npx pod-install --project-directory=ios
          else
            cd ios
            pod install
            cd - >/dev/null
          fi

      - name: Resolve iOS scheme
        if: ${{ !inputs.skip-build }}
        id: ios-scheme
        run: |
          WORKSPACE_PATH=$(find ios -maxdepth 2 -type d -name "*.xcworkspace" ! -path "*/*.xcodeproj/*" | head -n 1)
          if [ -z "${WORKSPACE_PATH}" ]; then
            WORKSPACE_PATH=$(find ios -maxdepth 3 -type d -name "*.xcworkspace" ! -path "*/*.xcodeproj/*" | head -n 1)
          fi
          PROJECT_PATH=$(find ios -maxdepth 2 -name "*.xcodeproj" | head -n 1)

          if [ -n "${WORKSPACE_PATH}" ]; then
            LIST_JSON=$(xcodebuild -list -json -workspace "${WORKSPACE_PATH}")
            CONTAINER_FLAG="-workspace"
            CONTAINER_PATH="${WORKSPACE_PATH}"
          elif [ -n "${PROJECT_PATH}" ]; then
            LIST_JSON=$(xcodebuild -list -json -project "${PROJECT_PATH}")
            CONTAINER_FLAG="-project"
            CONTAINER_PATH="${PROJECT_PATH}"
          else
            echo "❌ No Xcode workspace/project found under ios/."
            exit 1
          fi

          AVAILABLE_SCHEMES=$(LIST_JSON="${LIST_JSON}" python3 -c "import json, os; data = json.loads(os.environ['LIST_JSON']); schemes = (data.get('workspace', {}).get('schemes') or []) + (data.get('project', {}).get('schemes') or []); seen = []; [seen.append(scheme) for scheme in schemes if scheme not in seen]; print('\\n'.join(seen))")

          echo "ℹ️ Available schemes:"
          printf '%s\n' "${AVAILABLE_SCHEMES}"

          SCHEME=$(CONTAINER_PATH="${CONTAINER_PATH}" AVAILABLE_SCHEMES="${AVAILABLE_SCHEMES}" python3 -c "import os, re; container_path = os.environ.get('CONTAINER_PATH', ''); schemes = [line.strip() for line in os.environ.get('AVAILABLE_SCHEMES', '').splitlines() if line.strip()]; container_name = os.path.splitext(os.path.basename(container_path))[0]; preferred_names = [container_name]; excluded = re.compile(r'^(Pods($|-)|.*Tests?$|.*UITests?$|.*UnitTests?$|.*IntegrationTests?$|.*SnapshotTests?$|.*tvOS.*|.*macOS.*)$', re.I); exact = next((scheme for preferred in preferred_names for scheme in schemes if not excluded.match(scheme) and scheme.lower() == preferred.lower()), None); contains = next((scheme for preferred in preferred_names for scheme in schemes if not excluded.match(scheme) and preferred and preferred.lower() in scheme.lower()), None); fallback = next((scheme for scheme in schemes if not excluded.match(scheme)), schemes[0] if schemes else ''); print(exact or contains or fallback)")

          if [ -z "${SCHEME}" ]; then
            echo "❌ Could not resolve an iOS scheme for build."
            exit 1
          fi

          echo "container_flag=${CONTAINER_FLAG}" >> "$GITHUB_OUTPUT"
          echo "container_path=${CONTAINER_PATH}" >> "$GITHUB_OUTPUT"
          echo "scheme=${SCHEME}" >> "$GITHUB_OUTPUT"
          echo "✅ Using iOS scheme: ${SCHEME}"

      - name: Build iOS app binary
        if: ${{ !inputs.skip-build }}
        env:
          CONTAINER_FLAG: ${{ steps.ios-scheme.outputs.container_flag }}
          CONTAINER_PATH: ${{ steps.ios-scheme.outputs.container_path }}
          SCHEME: ${{ steps.ios-scheme.outputs.scheme }}
          IOS_BUILD_COMMAND: ${{ inputs.ios-build-command }}
          FORCE_BUNDLING: "1"
          SKIP_BUNDLING: ""
        run: |
          if [ -n "${IOS_BUILD_COMMAND}" ]; then
            echo "ℹ️ Running custom iOS app build command for Maestro."
            bash -c "${IOS_BUILD_COMMAND}"
            exit 0
          fi

          echo "ℹ️ Running explicit xcodebuild for Maestro iOS simulator configuration."
          xcodebuild \
            ${CONTAINER_FLAG} "${CONTAINER_PATH}" \
            -scheme "${SCHEME}" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CLANG_WARN_NULLABILITY_COMPLETENESS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            clean build

      - name: Resolve iOS app bundle path
        id: ios-app
        run: |
          APP_PATH=$(find ios/build -type d -name "*.app" | sort | head -n 1)
          if [ -z "${APP_PATH}" ]; then
            echo "❌ Unable to find iOS .app bundle for Maestro."
            if [ -d "ios/build" ]; then
              echo "📁 Build output tree:"
              find ios/build -maxdepth 5 | sort
            fi
            exit 1
          fi

          echo "app_path=${APP_PATH}" >> "$GITHUB_OUTPUT"
          echo "✅ Resolved iOS app bundle: ${APP_PATH}"

      - name: Resolve iOS bundle identifier
        id: ios-bundle-id
        run: |
          APP_PATH="${{ steps.ios-app.outputs.app_path }}"

          if [ ! -f "${APP_PATH}/Info.plist" ]; then
            echo "❌ Info.plist not found in app bundle: ${APP_PATH}"
            exit 1
          fi

          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "${APP_PATH}/Info.plist" 2>/dev/null || true)
          if [ -z "${BUNDLE_ID}" ]; then
            echo "❌ Could not resolve CFBundleIdentifier from ${APP_PATH}/Info.plist"
            exit 1
          fi

          echo "bundle_id=${BUNDLE_ID}" >> "$GITHUB_OUTPUT"
          echo "✅ Resolved iOS bundle identifier: ${BUNDLE_ID}"

      - name: Boot iOS simulator
        id: ios-sim
        run: |
          BOOTED_UDID=$(xcrun simctl list devices | grep '(Booted)' | grep -m 1 'iPhone' | sed -E 's/.*\(([A-F0-9-]+)\) \(Booted\).*/\1/' || true)

          if [ -n "${BOOTED_UDID}" ]; then
            SIM_UDID="${BOOTED_UDID}"
            echo "✅ Using already booted iPhone simulator: ${SIM_UDID}"
          else
            SIM_UDID=$(xcrun simctl list devices available | grep -m 1 'iPhone' | sed -E 's/.*\(([A-F0-9-]+)\) .*/\1/' || true)
            if [ -z "${SIM_UDID}" ]; then
              echo "❌ No available iPhone simulator device found."
              xcrun simctl list devices available
              exit 1
            fi

            echo "⏳ Booting iPhone simulator: ${SIM_UDID}"
            xcrun simctl boot "${SIM_UDID}" || true
            xcrun simctl bootstatus "${SIM_UDID}" -b
            echo "✅ iPhone simulator booted: ${SIM_UDID}"
          fi

          echo "sim_udid=${SIM_UDID}" >> "$GITHUB_OUTPUT"

      - name: Install app on iOS simulator
        run: |
          APP_PATH="${{ steps.ios-app.outputs.app_path }}"
          SIM_UDID="${{ steps.ios-sim.outputs.sim_udid }}"

          xcrun simctl install "${SIM_UDID}" "${APP_PATH}"
          echo "✅ Installed app on simulator ${SIM_UDID}"

      - name: Prepare Maestro iOS run log
        run: |
          LOG_DIR="${{ inputs.working-directory == '.' && github.workspace || format('{0}/{1}', github.workspace, inputs.working-directory) }}"

          mkdir -p "${LOG_DIR}"
          : > "${LOG_DIR}/maestro-ios-run.log"

      - name: Run Maestro tests on iOS simulator
        id: maestro-ios-run
        env:
          MAESTRO_TEST_COMMAND: ${{ inputs.maestro-test-command }}
          SIM_UDID: ${{ steps.ios-sim.outputs.sim_udid }}
          RESOLVED_BUNDLE_ID: ${{ steps.ios-bundle-id.outputs.bundle_id }}
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          export MAESTRO_DRIVER_STARTUP_TIMEOUT=420000
          export MAESTRO_IOS_DEVICE_ID="${SIM_UDID}"

          LOG_DIR="${{ inputs.working-directory == '.' && github.workspace || format('{0}/{1}', github.workspace, inputs.working-directory) }}"

          LOG_FILE="${LOG_DIR}/maestro-ios-run.log"
          : > "${LOG_FILE}"

          MAESTRO_CMD="${MAESTRO_TEST_COMMAND}"

          case "${MAESTRO_CMD}" in
            *"maestro test .maestro"*)
              case "${MAESTRO_CMD}" in
                *"--include-tags"*|*"--exclude-tags"*) ;;
                *)
                  MAESTRO_CMD="${MAESTRO_CMD} --exclude-tags android"
                  echo "ℹ️ Auto-applied Maestro iOS filter: --exclude-tags android"
                  ;;
              esac
              ;;
          esac

          FLOW_APP_ID=$(grep -RhoE '^[[:space:]]*appId:[[:space:]]*[^[:space:]]+' .maestro 2>/dev/null | head -n 1 | sed -E 's/^[[:space:]]*appId:[[:space:]]*//')
          if [ -n "${FLOW_APP_ID}" ] && [ -n "${RESOLVED_BUNDLE_ID}" ] && [ "${FLOW_APP_ID}" != "${RESOLVED_BUNDLE_ID}" ]; then
            echo "⚠️ Flow appId (${FLOW_APP_ID}) differs from built bundle id (${RESOLVED_BUNDLE_ID})."
          fi

          xcrun simctl launch "${SIM_UDID}" "${RESOLVED_BUNDLE_ID}" >/dev/null 2>&1 || true

          echo "ℹ️ Using bundle id: ${RESOLVED_BUNDLE_ID}"
          echo "ℹ️ Maestro command: ${MAESTRO_CMD}"

          set +e
          bash -lc "${MAESTRO_CMD}" > "${LOG_FILE}" 2>&1
          MAESTRO_STATUS=$?
          set -e
          cat "${LOG_FILE}"
          echo "maestro_status=${MAESTRO_STATUS}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Maestro iOS run log
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.system-name }}-maestro-ios-log
          path: ${{ inputs.working-directory == '.' && format('{0}/maestro-ios-run.log', github.workspace) || format('{0}/{1}/maestro-ios-run.log', github.workspace, inputs.working-directory) }}
          if-no-files-found: warn
          retention-days: 14

      - name: Fail if Maestro iOS tests failed
        if: ${{ steps.maestro-ios-run.outputs.maestro_status != '0' }}
        run: |
          echo "❌ Maestro iOS tests failed with exit code ${{ steps.maestro-ios-run.outputs.maestro_status }}."
          exit 1
