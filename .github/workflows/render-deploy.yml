# Contract: docs/workflows/render-deploy.md
name: "Reusable: Render Image Deploy"

on:
  workflow_call:
    inputs:
      system-name:
        required: true
        type: string
        description: "System name for display"
      environment:
        required: false
        type: string
        default: "test"
        description: "Deployment environment"
      branch:
        required: false
        type: string
        default: ""
        description: "Source branch"
      working-directory:
        required: false
        type: string
        default: "."
        description: "Source working directory"
      docker-context:
        required: false
        type: string
        default: "."
        description: "Docker build context"
      dockerfile-path:
        required: false
        type: string
        default: "Dockerfile"
        description: "Dockerfile path"
      image-name:
        required: true
        type: string
        description: "GHCR image name"
      checkout-ref:
        required: false
        type: string
        default: ""
        description: "Git ref or SHA to checkout"
    secrets:
      RENDER_API_KEY:
        required: true
      RENDER_SERVICE_ID:
        required: true
      RENDER_OWNER_ID:
        required: true
      RENDER_REGISTRY_CREDENTIAL_ID:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  render-deploy:
    name: "Build image and deploy ${{ inputs.system-name }} to Render"
    if: ${{ contains(fromJSON('["test","uat","main"]'), inputs.branch || github.ref_name) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Compute image tag
        id: image
        shell: bash
        run: |
          SAFE_BRANCH="$(printf '%s' '${{ inputs.branch || github.ref_name }}' | tr '/[:upper:]' '-[:lower:]')"
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${SAFE_BRANCH}-${{ github.sha }}"
          ENCODED="$(IMAGE="$IMAGE" python -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["IMAGE"], safe=""))')"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "encoded=${ENCODED}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ steps.image.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Render image
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_OWNER_ID: ${{ secrets.RENDER_OWNER_ID }}
          RENDER_REGISTRY_CREDENTIAL_ID: ${{ secrets.RENDER_REGISTRY_CREDENTIAL_ID }}
          IMAGE_URL: ${{ steps.image.outputs.image }}
        shell: bash
        run: |
          python - <<'PY' > render-image-payload.json
          import json
          import os

          image = {
              "ownerId": os.environ["RENDER_OWNER_ID"],
              "imagePath": os.environ["IMAGE_URL"],
          }
          registry_credential_id = os.environ.get("RENDER_REGISTRY_CREDENTIAL_ID", "").strip()
          if registry_credential_id:
              image["registryCredentialId"] = registry_credential_id

          print(json.dumps({"image": image}))
          PY

          curl -fsS -X PATCH "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            --data @render-image-payload.json

      - name: Trigger Render image deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          IMAGE_URL: ${{ steps.image.outputs.image }}
        shell: bash
        run: |
          curl -fsS -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\":\"${IMAGE_URL}\"}"
          echo "Triggered Render image deploy for ${{ inputs.system-name }}."
