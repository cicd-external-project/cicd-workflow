# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE: be-pipeline-caller.yml
#
# Copy this file into the target backend repo at:
#   .github/workflows/be-pipeline-caller.yml   (or any name you prefer)
#
# Calls the unified backend orchestrator in cicd-external-project/cicd-workflow.
#
# Triggers:
#   push         → test, uat, main   (full pipeline: quality + security + deploy + promote)
#   pull_request → test, uat, main   (quality gate only — no deploy, no promote)
#   workflow_dispatch                 (manual with override inputs)
#
# Required repository variables (set on the caller repo):
#   BACKEND_SINGLE_SYSTEMS_JSON — describes this service, e.g.:
#     {"name":"my-service","dir":".","image":"ghcr.io/cicd-external-project/my-service","backend_stack":"nestjs"}
#   Or for multi-service monorepos: BACKEND_MULTI_SYSTEMS_JSON (JSON array of the above)
#
# Required secrets:
#   GH_PR_TOKEN                 — GitHub PAT for promotion PRs and release tags
#   RENDER_DEPLOY_HOOK_URL_TEST  — Render deploy hook for test environment
#   RENDER_DEPLOY_HOOK_URL_UAT   — Render deploy hook for uat environment
#   RENDER_DEPLOY_HOOK_URL_MAIN  — Render deploy hook for production environment
#   RENDER_HEALTHCHECK_URL_TEST  — Render health URL for test environment
#   RENDER_HEALTHCHECK_URL_UAT   — Render health URL for uat environment
#   RENDER_HEALTHCHECK_URL_MAIN  — Render health URL for production environment
#
# Optional secrets (for SonarCloud and k6):
#   SONAR_TOKEN, SONAR_ORGANIZATION, SONAR_PROJECT_KEY
#   K6_CLOUD_TOKEN
#
# Health check note:
#   render-deploy.yml defaults require-api-center-check to true. If the service
#   health endpoint returns { "status": "ok" } (no apiCenter payload), you must
#   override this in master-pipeline-be.yml. See the render-deploy.yml call site
#   in master-pipeline-be.yml and set require-api-center-check: false if needed.
# ─────────────────────────────────────────────────────────────────────────────
name: "BE Pipeline Caller"

on:
  push:
    branches: [test, uat, main]
  pull_request:
    branches: [test, uat, main]
  workflow_dispatch:
    inputs:
      pipeline_mode:
        description: "Pipeline mode (auto|single|multi)"
        type: choice
        options: [auto, single, multi]
        default: auto
      enable_security_scan:
        description: "Run backend security scans"
        type: boolean
        default: true
      enable_sonar:
        description: "Run SonarCloud analysis"
        type: boolean
        default: true
      enable_k6:
        description: "Run Grafana k6 performance tests"
        type: boolean
        default: true
      k6_script_path:
        description: "k6 performance test path"
        type: string
        default: "tests/performance"
      k6_base_url:
        description: "Optional override base URL for k6"
        type: string
        default: ""
      k6_run_only_on_branch:
        description: "Allowed branches for k6"
        type: string
        default: "test,main"
      run_deploy:
        description: "Enable deployment"
        type: boolean
        default: true
      run_promotion:
        description: "Enable PR promotions"
        type: boolean
        default: true
      dry_run:
        description: "Preview, skip deploy/tag push"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  packages: write
  security-events: write

jobs:
  call-backend-orchestrator:
    # Pin to a release tag once cicd-external-project/cicd-workflow publishes one.
    # Use @main until then.
    uses: cicd-external-project/cicd-workflow/.github/workflows/master-pipeline-be.yml@main
    with:
      pipeline_mode: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pipeline_mode || 'auto' }}
      enable_security_scan: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_security_scan || 'true') || true }}
      enable_sonar: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_sonar || 'true') || true }}
      enable_k6: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_k6 || 'true') || true }}
      k6_script_path: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_script_path || 'tests/performance' }}
      k6_base_url: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_base_url || '' }}
      k6_run_only_on_branch: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_run_only_on_branch || 'test,main' }}
      run_deploy: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.run_deploy || 'true') || github.event_name == 'push' }}
      run_promotion: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.run_promotion || 'true') || github.event_name == 'push' }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.dry_run || 'false') || false }}
    secrets: inherit
