# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE: fe-pipeline-caller.yml
#
# Copy this file into the target frontend repo at:
#   .github/workflows/fe-pipeline-caller.yml   (or any name you prefer)
#
# Calls the unified frontend orchestrator in cicd-external-project/cicd-workflow.
# The orchestrator deploys to Vercel (NOT Render) via vercel-deploy.yml.
#
# Triggers:
#   push         → test, uat, main   (full pipeline: quality + security + deploy + promote)
#   pull_request → test, uat, main   (quality gate + preview Vercel deploy for PR review)
#   workflow_dispatch                 (manual with override inputs)
#
# Required repository variables (set on the caller repo):
#   FE_SINGLE_SYSTEMS_JSON — describes this frontend, e.g.:
#     {
#       "name": "my-fe",
#       "dir": ".",
#       "image": "ghcr.io/cicd-external-project/my-fe",
#       "vercel_project_secret": "VERCEL_PROJECT_ID"
#     }
#   The "vercel_project_secret" field is the NAME of the secret that holds the
#   Vercel project ID. The orchestrator resolves it via secrets[system.vercel_project_secret].
#   Or for multi-system repos: FE_MULTI_SYSTEMS_JSON (JSON array of the above).
#
# Required secrets:
#   GH_PR_TOKEN       — GitHub PAT for promotion PRs, release tags, and Vercel PR comments
#   VERCEL_TOKEN      — Vercel API token (shared across org)
#   VERCEL_ORG_ID     — Vercel org/team ID
#   VERCEL_PROJECT_ID — Vercel project ID (referenced by vercel_project_secret in systems JSON)
#
# Optional secrets (for SonarCloud, Playwright cloud, k6):
#   SONAR_TOKEN, SONAR_ORGANIZATION, SONAR_PROJECT_KEY
#   K6_CLOUD_TOKEN
# ─────────────────────────────────────────────────────────────────────────────
name: "Master Pipeline — FE"

on:
  push:
    branches: [test, uat, main]
  pull_request:
    branches: [test, uat, main]
  workflow_dispatch:
    inputs:
      pipeline_mode:
        description: "Pipeline mode (auto|single|multi)"
        type: choice
        options: [auto, single, multi]
        default: auto
      enable_playwright:
        description: "Run Playwright E2E checks"
        type: boolean
        default: true
      playwright_browsers:
        description: "Playwright browser list (JSON array or CSV)"
        type: string
        default: '["chromium"]'
      e2e_base_url:
        description: "Optional base URL for Playwright E2E"
        type: string
        default: ""
      playwright_run_only_on_branch:
        description: "Branch allowed for Playwright execution"
        type: string
        default: "test,uat"
      enable_grafana_k6:
        description: "Run Grafana k6 cloud checks"
        type: boolean
        default: true
      k6_script_path:
        description: "Path to k6 script or performance tests directory"
        type: string
        default: "tests/performance"
      k6_base_url:
        description: "Optional base URL for k6"
        type: string
        default: ""
      k6_run_only_on_branch:
        description: "Branch allowed for k6 execution"
        type: string
        default: "test,uat"
      run_deploy:
        description: "Run deploy jobs"
        type: boolean
        default: true
      run_promotion:
        description: "Run PR promotion jobs"
        type: boolean
        default: true
      dry_run:
        description: "Preview-only mode (skip deploy/tag push, print PR body)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  packages: write
  security-events: write

jobs:
  call-orchestrator:
    # Pin to a release tag once cicd-external-project/cicd-workflow publishes one.
    # Use @main until then.
    # The orchestrator uses vercel-deploy.yml internally — NOT render-deploy.yml.
    uses: cicd-external-project/cicd-workflow/.github/workflows/master-pipeline-fe.yml@main
    with:
      pipeline_mode: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pipeline_mode || 'auto' }}
      enable_playwright: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_playwright || 'true') || true }}
      playwright_browsers: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.playwright_browsers || '["chromium"]' }}
      e2e_base_url: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.e2e_base_url || '' }}
      playwright_run_only_on_branch: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.playwright_run_only_on_branch || 'test,uat' }}
      enable_grafana_k6: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.enable_grafana_k6 || 'true') || true }}
      k6_script_path: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_script_path || 'tests/performance' }}
      k6_base_url: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_base_url || '' }}
      k6_run_only_on_branch: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.k6_run_only_on_branch || 'test,uat' }}
      run_deploy: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.run_deploy || 'true') || github.event_name == 'push' }}
      run_promotion: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.run_promotion || 'true') || github.event_name == 'push' }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.dry_run || 'false') || false }}
    secrets: inherit
